automations:
- id: mcp_triage_inbox
  name: Triage inbox (odoo-mcp test)
  trigger:
    all:
    - field: stage
      eq: Inbox
  actions:
  - kind: capability
    body: triage
    allowed_outcomes:
    - add_tag
    - comment
    - set_priority
    - move_stage
    - escalate
    - set_status
    - create_activity
    - remove_tag
    - fail
- id: mcp_build
  name: Build (implementation) — odoo-mcp
  # One heavy build per tick: keeps a long implementation run from starving
  # triage/shaping dispatch slots (global cap is 5/tick).
  max_per_tick: 1
  trigger:
    all:
    - field: stage
      eq: Build
  actions:
  - kind: capability
    body: implementation
    allowed_outcomes:
    - open_pr
    - comment
    - commit
    - link_artifact
    - move_stage
    - set_status
    - create_activity
    - escalate
    - fail
